<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Stash - Unblocked Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            cursor: none;
        }
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.05));
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glowing-title {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px #ffffff, 0 0 40px #ffffff;
            animation: glowPulse 2s ease-in-out infinite;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #fff;
            animation: typewriter 4s steps(14) 1s 1 normal both, blinkTextCursor 500ms steps(14) infinite normal, glowPulse 2s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 0 0 20px #ffffff, 0 0 40px #ffffff;
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 40px #ffffff, 0 0 80px #ffffff;
                transform: scale(1.02);
            }
        }
        @keyframes typewriter {
            from {
                width: 0;
            }
            to {
                width: 14em; /* Adjust the width to fit "Welcome to The Stash" up to the "H" in "Stash" */
            }
        }
        @keyframes blinkTextCursor {
            from {
                border-right-color: #fff;
            }
            to {
                border-right-color: transparent;
            }
        }
        .subtitle {
            font-size: 1.3rem;
            color: #888888;
            margin-bottom: 2rem;
            font-style: italic;
        }
        /* Navigation */
        header {
            background-color: rgba(17, 17, 17, 0.5);
            padding: 1rem 0;
            position: relative;
            z-index: 2;
            border-radius: 8px;
            margin: 1rem auto;
            max-width: 800px;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 300;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        nav a:hover {
            background-color: rgba(51, 51, 51, 0.5);
        }
        /* Search Bar */
        .search-container {
            margin: 2rem 0;
        }
        .search-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ffffff;
            border-radius: 50px;
            padding: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .search-wrapper:hover,
        .search-wrapper:focus-within {
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 30px rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }
        .search-icon {
            font-size: 1.5rem;
            margin: 0 1rem;
        }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 1rem;
            padding: 0.8rem;
            outline: none;
        }
        .search-input::placeholder {
            color: #666666;
        }
        .search-btn {
            display: none;
        }
        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-number {
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 10px #ffffff;
        }
        .stat-label {
            font-size: 0.9rem;
            color: #888888;
            margin-top: 0.5rem;
        }
        /* Game Grid */
        .featured-games {
            padding: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .featured-games h2 {
            font-size: 2rem;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffff;
            margin-bottom: 2rem;
            text-align: center;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ffffff;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            border-color: #ffffff;
        }
        .game-thumbnail {
            position: relative;
            height: 150px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .game-placeholder {
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: bold;
        }
        .game-card h3 {
            padding: 1rem 1rem 0.5rem;
            color: #ffffff;
            font-size: 1rem;
        }
        .game-category {
            color: #888888;
            font-size: 0.85rem;
            padding: 0 1rem;
            margin-bottom: 1rem;
        }
        .play-btn {
            width: calc(100% - 2rem);
            margin: 0 1rem 1rem;
            padding: 0.8rem;
            background: linear-gradient(135deg, #ffffff, #ffffff);
            border: none;
            color: #000000;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
        .new-tab-btn {
            width: calc(100% - 2rem);
            margin: 0 1rem 1rem;
            padding: 0.8rem;
            background: linear-gradient(135deg, #ffffff, #ffffff);
            border: none;
            color: #000000;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .new-tab-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
        /* Game Modal */
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .game-modal.active {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }
        .modal-content {
            background: #000;
            border: 2px solid #ffffff;
            border-radius: 10px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease forwards;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeOutDown {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(20px);
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 2px solid #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }
        .modal-title {
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffff;
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
        }
        .close-btn, .new-tab-btn-modal {
            background: #ffffff;
            color: #000;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-btn:hover, .new-tab-btn-modal:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
        .new-tab-btn-modal {
            font-size: 1rem;
            width: auto;
            padding: 0 10px;
            border-radius: 20px;
        }
        .modal-game {
            flex: 1;
            overflow: auto;
        }
        .modal-game iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Footer */
        .footer {
            background: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #ffffff;
            padding: 2rem;
            text-align: center;
            margin-top: 3rem;
            box-shadow: 0 -0 20px rgba(255, 255, 255, 0.2);
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-content p {
            color: #888888;
            margin: 0.5rem 0;
        }
        /* Pages */
        .page {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .page.active {
            display: block;
            opacity: 1;
        }
        .iframe-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0;
            position: relative;
        }
        .iframe-container iframe {
            width: 100%;
            height: 80vh;
            border: 2px solid #333;
            border-radius: 8px;
        }
        .fullscreen-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            z-index: 4;
        }
        .fullscreen-button:hover {
            background-color: #555;
        }
        .fireball {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff6600;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            box-shadow: 0 0 10px #ff6600, 0 0 20px #ff3300;
            transform: translate(-50%, -50%);
        }
        @media (max-width: 768px) {
            .glowing-title {
                font-size: 2.5rem;
            }
            .game-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="fireball" id="fireball"></div>
    <canvas id="particleCanvas"></canvas>
    <!-- Navigation -->
    <header>
        <nav>
            <a onclick="showPage('home')" class="button">Home</a>
            <a onclick="showPage('games')" class="button">Games</a>
            <a onclick="showPage('ai')" class="button">AI</a>
            <a onclick="showPage('settings')" class="button">Settings</a>
            <a onclick="showPage('contact')" class="button">Contact</a>
        </nav>
    </header>
    <!-- Hero Section -->
    <section class="hero">
        <h1 class="glowing-title">Welcome to The Stash</h1>
        <p class="subtitle">Made by Josh</p>
        <div class="search-container">
            <div class="search-wrapper">
                <span class="search-icon">🎮</span>
                <input
                    type="text"
                    class="search-input"
                    placeholder="Search games..."
                    id="searchInput"
                    oninput="searchGames()"
                >
                <button class="search-btn" onclick="searchGames()">Search</button>
            </div>
        </div>
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-number">500+</span>
                <span class="stat-label">Games Available</span>
            </div>
            <div class="stat">
                <span class="stat-number">1.2M+</span>
                <span class="stat-label">Active Players</span>
            </div>
            <div class="stat">
                <span class="stat-number">99.9%</span>
                <span class="stat-label">Uptime</span>
            </div>
        </div>
    </section>
    <!-- Pages -->
    <main>
        <div id="home" class="page active">
            <!-- Featured Games -->
            <section class="featured-games" id="games">
                <h2>Featured Games</h2>
                <div class="game-grid" id="gameGrid">
                    <!-- Games will be loaded here -->
                </div>
            </section>
        </div>
        <div id="games" class="page">
            <div class="iframe-container">
                <button class="fullscreen-button" onclick="toggleFullscreen('games-iframe')">Fullscreen</button>
                <iframe id="games-iframe" src="https://s3.amazonaws.com/ilovecalc/index.html" frameborder="0"></iframe>
            </div>
        </div>
        <div id="ai" class="page">
            <div class="iframe-container">
                <button class="fullscreen-button" onclick="toggleFullscreen('ai-iframe')">Fullscreen</button>
                <iframe id="ai-iframe" src="https://joshs-ai.zapier.app/chat" frameborder="0"></iframe>
            </div>
        </div>
        <div id="settings" class="page">
            <div class="settings-container">
                <h2>Settings</h2>
                <p>Customize your experience.</p>
                <label for="theme">Select Background Theme:</label>
                <select id="theme" onchange="changeTheme()">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                    <option value="blue">Blue</option>
                    <option value="green">Green</option>
                </select>
                <label for="wallpaper">Upload Wallpaper from Camera Roll:</label>
                <input type="file" id="wallpaper" accept="image/*" onchange="changeWallpaper()">
                <button onclick="resetSettings()">Reset Settings</button>
            </div>
        </div>
        <div id="contact" class="page">
            <div class="hero">
                <h2>Contact</h2>
                <p>Talk to me at school -Josh</p>
                <a href="#" class="button">Send Message</a>
            </div>
        </div>
    </main>
    <!-- Game Modal -->
    <div class="game-modal" id="gameModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Game</h2>
                <div class="modal-buttons">
                    <button class="new-tab-btn-modal" onclick="openInNewTabFromModal()">Open in New Tab</button>
                    <button class="close-btn" onclick="closeGame()">✕</button>
                </div>
            </div>
            <div class="modal-game" id="gameContainer"></div>
        </div>
    </div>
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 The Stash. All rights reserved.</p>
            <p>Made with ❤️ by Josh</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Particle Animation
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                const colors = ['#ffffff', '#ffffff', '#ffffff'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        const particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }
        function drawConnections() {
            const connectionDistance = 150;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < connectionDistance) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.2 * (1 - distance / connectionDistance)})`;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let particle of particles) {
                particle.update();
                particle.draw();
            }
            drawConnections();
            requestAnimationFrame(animate);
        }
        animate();
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Games Data
        let games = [
            {
                id: "custom-scratch-demon-list",
                name: "Scratch Demon List (GD)",
                author: "Josh",
                cover: "https://scratch.mit.edu/studios/36198776",
                url: "https://scratch.mit.edu/studios/36198776"
            }
        ];
        let currentGameId = null;
        const coverURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/covers@main";
        const htmlURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/html@main";

        function displayGames(gamesToDisplay) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            gamesToDisplay.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                const cover = game.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
                card.innerHTML = `
                    <div class="game-thumbnail">
                        <img src="${cover}" alt="${game.name}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <h3>${game.name}</h3>
                    <p class="game-category">${game.author || 'Unknown'}</p>
                    <button class="play-btn" onclick="playGame('${game.id}', '${game.name.replace(/'/g, "\\'")}')">Play Now</button>
                    <button class="new-tab-btn" onclick="openInNewTab('${game.id}', '${game.name.replace(/'/g, "\\'")}')">Open in New Tab</button>
                `;
                grid.appendChild(card);
            });
        }

        function playGame(gameId, gameName) {
            const game = games.find(g => g.id == gameId);
            if (!game) return;
            const modal = document.getElementById('gameModal');
            const container = document.getElementById('gameContainer');
            const title = document.getElementById('modalTitle');
            currentGameId = gameId;
            title.textContent = gameName;
            container.innerHTML = '<p style="text-align: center; color: #ffffff; padding: 20px;">Loading game...</p>';
            modal.classList.add('active');
            const iframe = document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.src = game.url;
            container.innerHTML = '';
            container.appendChild(iframe);
            iframe.onload = function() {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                iframeDoc.addEventListener('click', function(e) {
                    const target = e.target.closest('a');
                    if (target && target.href) {
                        e.preventDefault();
                        iframe.src = target.href;
                    }
                });
            };
        }

        function openInNewTab(gameId, gameName) {
            const game = games.find(g => g.id == gameId);
            if (!game) return;
            const newWindow = window.open(game.url, '_blank');
            if (!newWindow) {
                alert('Please allow pop-ups for this website to open the game in a new tab.');
            }
        }

        function openInNewTabFromModal() {
            if (!currentGameId) return;
            const game = games.find(g => g.id == currentGameId);
            if (!game) return;
            const newWindow = window.open(game.url, '_blank');
            if (!newWindow) {
                alert('Please allow pop-ups for this website to open the game in a new tab.');
            }
        }

        function closeGame() {
            const modal = document.getElementById('gameModal');
            const modalContent = modal.querySelector('.modal-content');
            modalContent.style.animation = 'fadeOutDown 0.5s ease forwards';
            setTimeout(() => {
                modal.classList.remove('active');
                document.getElementById('gameContainer').innerHTML = '';
                modalContent.style.animation = '';
                currentGameId = null;
            }, 500);
        }

        document.getElementById('gameModal').addEventListener('animationend', (e) => {
            if (e.animationName === 'fadeOutDown') {
                e.target.style.animation = '';
            }
        });

        function searchGames() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = games.filter(g => g.name.toLowerCase().includes(term));
            displayGames(filtered.length > 0 ? filtered : games);
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchGames();
        });

        // Display games on page load
        displayGames(games);

        // Show the home page by default
        function showPage(pageId) {
            // Hide all pages
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                page.classList.remove('active');
            });

            // Show the selected page
            const selectedPage = document.getElementById(pageId);
            selectedPage.classList.add('active');

            // Reset typewriter animation for home page
            if (pageId === 'home') {
                const homeHeading = document.querySelector('.glowing-title');
                homeHeading.style.animation = 'none';
                void homeHeading.offsetWidth; // Trigger reflow
                homeHeading.style.animation = 'typewriter 4s steps(14) 1s 1 normal both, blinkTextCursor 500ms steps(14) infinite normal, glowPulse 2s ease-in-out infinite';
            }
        }

        function changeTheme() {
            const theme = document.getElementById('theme').value;
            const body = document.body;

            switch (theme) {
                case 'dark':
                    body.style.backgroundColor = '#000';
                    body.style.color = '#fff';
                    break;
                case 'light':
                    body.style.backgroundColor = '#fff';
                    body.style.color = '#000';
                    break;
                case 'blue':
                    body.style.backgroundColor = '#0077be';
                    body.style.color = '#fff';
                    break;
                case 'green':
                    body.style.backgroundColor = '#4CAF50';
                    body.style.color = '#fff';
                    break;
                default:
                    body.style.backgroundColor = '#000';
                    body.style.color = '#fff';
            }
        }

        function changeWallpaper() {
            const wallpaperInput = document.getElementById('wallpaper');
            const file = wallpaperInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                document.body.style.backgroundImage = `url(${e.target.result})`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
            };

            if (file) {
                reader.readAsDataURL(file);
            }
        }

        function resetSettings() {
            document.body.style.backgroundImage = 'none';
            document.body.style.backgroundColor = '#000';
            document.body.style.color = '#fff';
            document.getElementById('theme').value = 'dark';
            document.getElementById('wallpaper').value = '';
        }

        function toggleFullscreen(iframeId) {
            const iframe = document.getElementById(iframeId);
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) { /* Safari */
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) { /* IE11 */
                iframe.msRequestFullscreen();
            }
        }

        // Custom cursor (fireball)
        const fireball = document.getElementById('fireball');
        document.addEventListener('mousemove', (e) => {
            fireball.style.left = `${e.clientX}px`;
            fireball.style.top = `${e.clientY}px`;
        });
    </script>
</body>
</html>
